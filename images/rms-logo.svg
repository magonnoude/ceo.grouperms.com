<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2540"/>
      <stop offset="100%" style="stop-color:#1a3a5c"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#f7c948"/>
    </linearGradient>
  </defs>
  
  <!-- R M S Letters - Modern geometric -->
  <g transform="translate(10, 15)">
    <!-- Letter R -->
    <path d="M0,0 L0,80 M0,0 L35,0 C50,0 55,10 55,25 C55,40 50,45 35,45 L0,45 M35,45 L55,80" 
          stroke="url(#primaryGrad)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Letter M -->
    <path d="M75,80 L75,0 L100,40 L125,0 L125,80" 
          stroke="url(#primaryGrad)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Letter S -->
    <path d="M150,20 C150,5 165,0 180,5 C195,10 200,25 190,35 C180,45 155,45 155,60 C155,75 165,85 185,80 C200,75 205,60 205,60" 
          stroke="url(#primaryGrad)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Company Name -->
  <text x="20" y="108" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#0a2540" letter-spacing="3">
    RMS INTERNATIONAL GROUP
  </text>
  
  <!-- Tagline -->
  <text x="20" y="118" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#f5a623" letter-spacing="2">
    ADVISORY • PLATFORM • ACADEMY
  </text>
</svg>