name: Deploy ceo.grouperms.com → S3 + CloudFront

on:
  push:
    branches:
      - main
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy to AWS S3
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repository ───────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Configure AWS credentials ─────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      # ── 3. Sync site files to S3 ─────────────────────────────────────────────
      - name: Sync to S3
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET }}/ \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.md" \
            --exclude "devops/*" \
            --exclude ".gitignore" \
            --cache-control "public, max-age=3600" \
            --metadata-directive REPLACE

      # ── 4. Set longer cache for static assets ────────────────────────────────
      - name: Set long-cache headers for static assets
        run: |
          # CSS and JS — 7 days
          aws s3 cp s3://${{ secrets.S3_BUCKET }}/css/styles.css \
            s3://${{ secrets.S3_BUCKET }}/css/styles.css \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=604800" \
            --content-type "text/css"

          aws s3 cp s3://${{ secrets.S3_BUCKET }}/js/main.js \
            s3://${{ secrets.S3_BUCKET }}/js/main.js \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=604800" \
            --content-type "application/javascript"

      # ── 5. Set correct content-types for key files ───────────────────────────
      - name: Fix content types
        run: |
          aws s3 cp s3://${{ secrets.S3_BUCKET }}/sitemap.xml \
            s3://${{ secrets.S3_BUCKET }}/sitemap.xml \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=86400" \
            --content-type "application/xml"

          aws s3 cp s3://${{ secrets.S3_BUCKET }}/robots.txt \
            s3://${{ secrets.S3_BUCKET }}/robots.txt \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=86400" \
            --content-type "text/plain"

          aws s3 cp s3://${{ secrets.S3_BUCKET }}/manifest.json \
            s3://${{ secrets.S3_BUCKET }}/manifest.json \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=86400" \
            --content-type "application/manifest+json"

      # ── 6. Invalidate CloudFront cache ───────────────────────────────────────
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      # ── 7. Print deployment summary ──────────────────────────────────────────
      - name: Deployment summary
        run: |
          echo "✅ Deployed to: https://ceo.grouperms.com"
          echo "🪣 S3 bucket:  ${{ secrets.S3_BUCKET }}"
          echo "🌐 CloudFront: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
          echo "📅 Time:       $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
